<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>brocolli-test fixture dapp</title>
    <style>
      body {
        color: #101828;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.5;
        margin: 2rem auto;
        max-width: 52rem;
        padding: 0 1rem;
      }
      button {
        margin: 0.25rem 0.5rem 0.25rem 0;
      }
      code,
      output {
        background: #f2f4f7;
        border-radius: 0.25rem;
        display: inline-block;
        padding: 0.125rem 0.375rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Fixture dapp</h1>
      <p>Minimal EIP-1193 dapp for deterministic wallet automation checks.</p>

      <section aria-labelledby="wallet-state-heading">
        <h2 id="wallet-state-heading">Wallet state</h2>
        <button type="button" data-testid="connect-wallet-button">Connect wallet</button>
        <dl>
          <dt>Connected account</dt>
          <dd><code data-testid="connected-account">not connected</code></dd>
          <dt>Current chain</dt>
          <dd><code data-testid="current-chain">unknown</code></dd>
        </dl>
      </section>

      <section aria-labelledby="wallet-actions-heading">
        <h2 id="wallet-actions-heading">Wallet actions</h2>
        <button type="button" data-testid="sign-message-button" disabled>Sign message</button>
        <output data-testid="sign-message-status">not requested</output>
        <br />
        <button type="button" data-testid="send-transaction-button" disabled>Send zero-value transaction</button>
        <output data-testid="send-transaction-status">not requested</output>
      </section>

      <section aria-labelledby="status-heading">
        <h2 id="status-heading">Status</h2>
        <output data-testid="status-output">Loading...</output>
      </section>
    </main>
    <script type="module" src="./dist/main.js"></script>
  </body>
</html>
