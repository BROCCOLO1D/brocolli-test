<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Broccolo1D wallet QA pipeline</title>
  <desc id="desc">A GitHub-renderable diagram showing dapp UI, Playwright fixtures, guarded wallet runtime, and verified artifacts.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07150F"/>
      <stop offset="0.55" stop-color="#0E2A1A"/>
      <stop offset="1" stop-color="#102A43"/>
    </linearGradient>
    <linearGradient id="leaf" x1="150" y1="80" x2="1050" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#B8F7A1"/>
      <stop offset="1" stop-color="#55D6BE"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1200" height="420" rx="34" fill="url(#bg)"/>
  <path d="M83 318C228 220 344 376 500 280C642 192 756 58 927 132C1036 179 1082 276 1128 337" stroke="url(#leaf)" stroke-width="3" stroke-linecap="round" opacity="0.35"/>
