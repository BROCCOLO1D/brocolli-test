      <text x="28" y="46" fill="#FFFFFF" font-size="21" font-weight="700">@broccolo1d/playwright</text>
      <text x="28" y="78" fill="#CBEBD4" font-size="14">fixtures · scenarios · contracts</text>
      <text x="28" y="101" fill="#8CECB7" font-size="13">screenshots + manifests</text>
