  <text x="70" y="126" fill="#C9F8D5" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="18">Policy-gated wallet automation for product-shaped dapp QA</text>
  <g filter="url(#shadow)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif">
