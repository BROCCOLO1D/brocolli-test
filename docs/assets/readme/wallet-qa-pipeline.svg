    <path d="M300 241H380" stroke="#9AF2B2" stroke-width="4" stroke-linecap="round"/><path d="M370 229L386 241L370 253" stroke="#9AF2B2" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <g transform="translate(400 178)">
